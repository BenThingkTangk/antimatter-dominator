<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />

    <!-- PWA: manifest + theme + apple touch icon -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ΔTOM" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ΔTOM" />

    <!-- ATOM canonical favicon — official @nirmata/atom-design-system orbital mark, ATOM teal #00c8c8 -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64' fill='none'%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' stroke='%2300c8c8' stroke-width='1.6' opacity='0.9'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' stroke='%2300c8c8' stroke-width='1.6' opacity='0.55' transform='rotate(60 32 32)'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' stroke='%2300c8c8' stroke-width='1.6' opacity='0.35' transform='rotate(120 32 32)'/%3E%3Ccircle cx='32' cy='32' r='4' fill='%23ffffff'/%3E%3C/svg%3E" />

    <!-- ATOM Brand v2.0 — Cabinet Grotesk (display) + Satoshi (body) via Fontshare; JetBrains Mono via Google Fonts -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

    <title>ΔTOM — AntimatterAI</title>
    <meta name="description" content="ΔTOM routes live intent into action. AI voice agents that operate at human speed and think at machine scale." />
    <meta name="theme-color" content="#0b0b0c" />
    <meta property="og:title" content="ΔTOM — AntimatterAI" />
    <meta property="og:description" content="AI systems that operate at human speed, think at machine scale, and feel like people." />
    <meta property="og:type" content="website" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Register the PWA service worker (production only — Vite dev mode
      // serves through its own origin and we don't want stale caches).
      if ("serviceWorker" in navigator && location.hostname !== "localhost") {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
