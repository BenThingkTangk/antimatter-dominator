<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 690 180" role="img" aria-labelledby="atom-wm-title atom-wm-desc" width="690" height="180">
  <title id="atom-wm-title">ΔTOM wordmark</title>
  <desc id="atom-wm-desc">Canonical ΔTOM wordmark. Δ, T, M are heavy geometric outline glyphs in light cream; the O is a teal ring at the same cap height. All four glyphs share a single baseline with tight, even tracking and a uniform 22-unit stroke weight.</desc>
  <g fill="none" stroke="#e8e8ea" stroke-width="22" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="32">
    <!-- Δ — Greek capital Delta as a heavy outline triangle with a sharp apex -->
    <polygon points="80,30 11,150 149,150"/>
    <!-- T — full-width top bar and centered stem -->
    <line x1="180" y1="41" x2="320" y2="41"/>
    <line x1="250" y1="41" x2="250" y2="150"/>
    <!-- O — teal ring at the same cap height and stroke weight -->
    <circle cx="410" cy="90" r="49" stroke="#00c8c8"/>
    <!-- M — two outer verticals joined by a centered V landing on the baseline -->
    <polyline points="500,150 500,30 580,150 660,30 660,150"/>
  </g>
</svg>
