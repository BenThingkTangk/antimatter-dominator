<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 96" role="img" aria-labelledby="atom-lk-title atom-lk-desc" width="480" height="96">
  <title id="atom-lk-title">ATOM lockup</title>
  <desc id="atom-lk-desc">Horizontal ATOM lockup: orbital icon paired with the ΔTOM wordmark. Δ, T, M are rendered in light cream; the O is a teal ring accent.</desc>
  <defs>
    <radialGradient id="lk-nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#00c8c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="lk-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .wm { font-family: 'Cabinet Grotesk', 'Satoshi', 'Inter', system-ui, sans-serif; font-weight: 800; font-size: 64px; letter-spacing: -0.02em; fill: #e8e8ea; }
    </style>
  </defs>
  <!-- Icon -->
  <g transform="translate(8 16)" filter="url(#lk-glow)">
    <g fill="none" stroke="#00c8c8" stroke-width="1.6">
      <ellipse cx="32" cy="32" rx="26" ry="10"/>
      <ellipse cx="32" cy="32" rx="26" ry="10" transform="rotate(60 32 32)"/>
      <ellipse cx="32" cy="32" rx="26" ry="10" transform="rotate(120 32 32)"/>
    </g>
    <circle cx="32" cy="32" r="6" fill="url(#lk-nucleus)"/>
    <circle cx="32" cy="32" r="2.4" fill="#ffffff"/>
  </g>
  <!-- Wordmark Δ T _ M with teal O ring -->
  <g transform="translate(96 0)">
    <text class="wm" x="0" y="72">Δ T</text>
    <text class="wm" x="226" y="72">M</text>
    <g transform="translate(172 40)">
      <circle cx="22" cy="22" r="20" fill="none" stroke="#00c8c8" stroke-width="6"/>
    </g>
  </g>
</svg>
