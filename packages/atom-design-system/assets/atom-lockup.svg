<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 240" role="img" aria-labelledby="atom-lk-title atom-lk-desc" width="1100" height="240">
  <title id="atom-lk-title">ATOM lockup</title>
  <desc id="atom-lk-desc">Horizontal ATOM lockup: teal atomic orbital icon with a glowing white nucleus, paired with the canonical ΔTOM wordmark. Δ, T, M are stroked in light cream; the O is a teal ring at the same cap height.</desc>
  <defs>
    <radialGradient id="lk-nucleus-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#bff3f3" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#00c8c8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00c8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lk-nucleus-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a1c" stop-opacity="1"/>
      <stop offset="70%" stop-color="#06181a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#04121a" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Orbital icon -->
  <g transform="translate(20 20)">
    <g fill="none" stroke="#3fb5b5" stroke-width="5" stroke-linecap="round">
      <ellipse cx="100" cy="100" rx="82" ry="32"/>
      <ellipse cx="100" cy="100" rx="82" ry="32" transform="rotate(60 100 100)"/>
      <ellipse cx="100" cy="100" rx="82" ry="32" transform="rotate(120 100 100)"/>
    </g>
    <circle cx="100" cy="100" r="26" fill="url(#lk-nucleus-shell)"/>
    <circle cx="100" cy="100" r="18" fill="url(#lk-nucleus-core)"/>
    <circle cx="100" cy="100" r="5" fill="#ffffff"/>
  </g>

  <!-- Wordmark — geometric strokes -->
  <g transform="translate(290 20)" fill="none" stroke-linecap="square" stroke-linejoin="miter">
    <polygon points="100,170 10,170 55,30" stroke="#f0f0f0" stroke-width="18"/>
    <line x1="150" y1="35" x2="310" y2="35" stroke="#f0f0f0" stroke-width="18"/>
    <line x1="230" y1="35" x2="230" y2="170" stroke="#f0f0f0" stroke-width="18"/>
    <circle cx="430" cy="102" r="70" stroke="#3fb5b5" stroke-width="18"/>
    <polyline points="540,170 540,35 615,150 690,35 690,170" stroke="#f0f0f0" stroke-width="18"/>
  </g>
</svg>
