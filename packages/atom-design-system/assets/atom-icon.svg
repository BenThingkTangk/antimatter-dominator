<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="atom-icon-title atom-icon-desc" width="64" height="64">
  <title id="atom-icon-title">ATOM orbital mark</title>
  <desc id="atom-icon-desc">Atomic orbital icon with three intersecting elliptical rings and a glowing white nucleus, rendered in ATOM teal.</desc>
  <defs>
    <radialGradient id="nucleus-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00c8c8" stop-opacity="0"/>
    </radialGradient>
    <filter id="teal-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#teal-glow)" fill="none" stroke="#00c8c8" stroke-width="1.6">
    <ellipse cx="32" cy="32" rx="26" ry="10"/>
    <ellipse cx="32" cy="32" rx="26" ry="10" transform="rotate(60 32 32)"/>
    <ellipse cx="32" cy="32" rx="26" ry="10" transform="rotate(120 32 32)"/>
  </g>
  <circle cx="32" cy="32" r="6" fill="url(#nucleus-glow)"/>
  <circle cx="32" cy="32" r="2.4" fill="#ffffff"/>
</svg>
