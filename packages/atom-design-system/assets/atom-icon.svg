<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="atom-icon-title atom-icon-desc" width="200" height="200">
  <title id="atom-icon-title">ATOM orbital mark</title>
  <desc id="atom-icon-desc">Atomic orbital icon: three intersecting elliptical orbits at 0°, 60°, 120° in ATOM teal, with a dark nucleus and a glowing white core.</desc>
  <defs>
    <radialGradient id="atom-nucleus-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#bff3f3" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#00c8c8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#00c8c8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="atom-nucleus-shell" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1a1c" stop-opacity="1"/>
      <stop offset="70%" stop-color="#06181a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#04121a" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Three orbits at 0°, 60°, 120° -->
  <g fill="none" stroke="#3fb5b5" stroke-width="4.5" stroke-linecap="round">
    <ellipse cx="100" cy="100" rx="82" ry="32"/>
    <ellipse cx="100" cy="100" rx="82" ry="32" transform="rotate(60 100 100)"/>
    <ellipse cx="100" cy="100" rx="82" ry="32" transform="rotate(120 100 100)"/>
  </g>

  <!-- Dark nucleus shell (the dark disc behind the glowing core) -->
  <circle cx="100" cy="100" r="26" fill="url(#atom-nucleus-shell)"/>

  <!-- Glowing white/teal core -->
  <circle cx="100" cy="100" r="18" fill="url(#atom-nucleus-core)"/>
  <circle cx="100" cy="100" r="5" fill="#ffffff"/>
</svg>
