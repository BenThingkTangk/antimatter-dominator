<!--
  ATOMLoader · cinematic boot sequence overlay
  Drop-in: include this file's <style>, <markup>, and <script> blocks into
  any page that already loads atom-tokens.css and atom-animations.css.

  JS API (window.ATOMLoader):
    .init({ duration?: number, autoStart?: boolean })  - configure (default duration 2500ms)
    .show()                                            - reveal overlay
    .hide()                                            - fade out + remove from a11y tree
    .play({ duration?: number })                       - show then auto-hide after duration

  Markup uses the canonical ΔTOM wordmark; Δ is U+0394.
-->

<style>
  #atom-loader {
    position: fixed;
    inset: 0;
    z-index: var(--z-loader, 100);
    display: grid;
    place-items: center;
    background: radial-gradient(circle at 50% 45%, #15161a 0%, #0b0b0c 60%, #060607 100%);
    color: var(--atom-text, #e8e8ea);
    transition: opacity var(--dur-slow, 320ms) var(--ease-atom, cubic-bezier(0.16,1,0.3,1)), visibility var(--dur-slow, 320ms);
    will-change: opacity;
  }
  #atom-loader[aria-hidden='true'] {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  #atom-loader .atom-loader__stage {
    position: relative;
    width: min(420px, 86vw);
    text-align: center;
  }

  #atom-loader .atom-loader__rings {
    position: relative;
    width: 180px; height: 180px;
    margin: 0 auto var(--space-6, 1.5rem);
  }
  #atom-loader .atom-loader__rings svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }
  #atom-loader .atom-loader__ring--a { animation: atom-orbit-spin     14s linear infinite; transform-origin: center; }
  #atom-loader .atom-loader__ring--b { animation: atom-orbit-counter  10s linear infinite; transform-origin: center; }
  #atom-loader .atom-loader__ring--c { animation: atom-orbit-spin      7s linear infinite; transform-origin: center; }

  #atom-loader .atom-loader__nucleus {
    position: absolute;
    top: 50%; left: 50%;
    width: 22px; height: 22px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, #ffffff 35%, rgba(0, 200, 200, 0) 70%);
    box-shadow:
      0 0 12px rgba(255, 255, 255, 0.9),
      0 0 36px rgba(0, 200, 200, 0.6),
      0 0 80px rgba(0, 200, 200, 0.35);
    animation: atom-pulse-dot 2.2s ease-in-out infinite;
  }

  #atom-loader .atom-loader__mark {
    display: block;
    width: clamp(220px, 38vw, 420px);
    height: auto;
    margin: 0 auto var(--space-4, 1rem);
    color: var(--atom-text, #e8e8ea);
    filter: drop-shadow(0 0 24px rgba(0, 200, 200, 0.35));
  }
  #atom-loader .atom-loader__mark svg { display: block; width: 100%; height: auto; }

  #atom-loader .atom-loader__caption {
    font-family: var(--atom-font-mono, 'JetBrains Mono', ui-monospace, monospace);
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--atom-text-muted, #8a8a96);
    opacity: 0;
    animation: atom-reveal-fade 600ms var(--ease-atom, cubic-bezier(0.16,1,0.3,1)) 800ms forwards;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5em;
    max-width: min(640px, 86vw);
    margin: 0 auto;
    font-weight: 700;
    line-height: 1.4;
  }
  #atom-loader .atom-loader__mantra-word--accent { color: var(--atom-primary, #00c8c8); }
  #atom-loader .atom-loader__mantra-word--muted  { color: var(--atom-text-muted, #8a8a96); }

  #atom-loader .atom-loader__bar {
    margin: var(--space-6, 1.5rem) auto 0;
    width: 240px;
    height: 2px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 9999px;
    overflow: hidden;
    position: relative;
  }
  #atom-loader .atom-loader__bar::after {
    content: '';
    position: absolute; inset: 0;
    width: 40%;
    background: linear-gradient(90deg, transparent, var(--atom-primary, #00c8c8), transparent);
    box-shadow: 0 0 18px rgba(0, 200, 200, 0.55);
    animation: atom-loader-sweep 1.4s ease-in-out infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    #atom-loader .atom-loader__ring--a,
    #atom-loader .atom-loader__ring--b,
    #atom-loader .atom-loader__ring--c,
    #atom-loader .atom-loader__nucleus,
    #atom-loader .atom-loader__bar::after { animation: none !important; }
    #atom-loader .atom-loader__mark span,
    #atom-loader .atom-loader__caption { opacity: 1; transform: none; animation: none; }
  }
</style>

<!-- Markup · drop this once near the start of <body> -->
<div id="atom-loader" role="status" aria-live="polite" aria-label="Loading ATOM">
  <div class="atom-loader__stage">
    <div class="atom-loader__rings" aria-hidden="true">
      <svg viewBox="0 0 180 180" class="atom-loader__ring atom-loader__ring--a">
        <ellipse cx="90" cy="90" rx="78" ry="30" fill="none" stroke="#00c8c8" stroke-width="1.4" opacity="0.9"/>
      </svg>
      <svg viewBox="0 0 180 180" class="atom-loader__ring atom-loader__ring--b" style="transform: rotate(60deg)">
        <ellipse cx="90" cy="90" rx="78" ry="30" fill="none" stroke="#00c8c8" stroke-width="1.4" opacity="0.55"/>
      </svg>
      <svg viewBox="0 0 180 180" class="atom-loader__ring atom-loader__ring--c" style="transform: rotate(120deg)">
        <ellipse cx="90" cy="90" rx="78" ry="30" fill="none" stroke="#00c8c8" stroke-width="1.4" opacity="0.35"/>
      </svg>
      <div class="atom-loader__nucleus"></div>
    </div>
    <div class="atom-loader__mark" role="img" aria-label="ΔTOM">
      <svg viewBox="0 0 690 180" preserveAspectRatio="xMidYMid meet">
        <g fill="none" stroke="currentColor" stroke-width="22" stroke-linecap="butt" stroke-linejoin="miter" stroke-miterlimit="32">
          <polygon points="80,30 11,150 149,150"/>
          <line x1="180" y1="41" x2="320" y2="41"/>
          <line x1="250" y1="41" x2="250" y2="150"/>
          <circle cx="410" cy="90" r="49" stroke="var(--atom-primary, #00c8c8)"/>
          <polyline points="500,150 500,30 580,150 660,30 660,150"/>
        </g>
      </svg>
    </div>
    <div class="atom-loader__caption">
      <span class="atom-loader__mantra-word atom-loader__mantra-word--accent">PRECISION.</span>
      <span class="atom-loader__mantra-word atom-loader__mantra-word--muted">EMPATHY.</span>
      <span class="atom-loader__mantra-word atom-loader__mantra-word--accent">VELOCITY.</span>
      <span class="atom-loader__mantra-word atom-loader__mantra-word--muted">INTELLIGENCE.</span>
      <span class="atom-loader__mantra-word atom-loader__mantra-word--accent">DISRUPTION.</span>
    </div>
    <div class="atom-loader__bar" aria-hidden="true"></div>
  </div>
</div>

<script>
  (function () {
    var STATE = { duration: 2500, el: null };

    function getEl() {
      if (!STATE.el) STATE.el = document.getElementById('atom-loader');
      return STATE.el;
    }

    function show() {
      var el = getEl();
      if (!el) return;
      el.setAttribute('aria-hidden', 'false');
      el.style.display = '';
    }

    function hide() {
      var el = getEl();
      if (!el) return;
      el.setAttribute('aria-hidden', 'true');
    }

    function play(opts) {
      var d = (opts && typeof opts.duration === 'number') ? opts.duration : STATE.duration;
      show();
      window.setTimeout(hide, d);
    }

    function init(opts) {
      opts = opts || {};
      if (typeof opts.duration === 'number') STATE.duration = opts.duration;
      if (opts.autoStart !== false) {
        // Auto-play once on load
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          play({ duration: STATE.duration });
        } else {
          document.addEventListener('DOMContentLoaded', function () {
            play({ duration: STATE.duration });
          });
        }
      }
    }

    window.ATOMLoader = { init: init, show: show, hide: hide, play: play };
  })();
</script>
