<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 2048" width="2048" height="2048" role="img" aria-labelledby="v4-vrs-title v4-vrs-desc">
  <title id="v4-vrs-title">ΔTOM V4 VR splash / loading scene</title>
  <desc id="v4-vrs-desc">ΔTOM V4 VR-safe splash for Oculus/Meta app entry and loading scenes. Square 2048 with a deep radial spatial field, an emissive orbital mark and the ΔTOM lockup centered in the comfortable foveal zone. Use as a skybox-facing quad or system splash. Brand cyan #39BFC0.</desc>
  <defs>
    <radialGradient id="v4-vrs-field" cx="50%" cy="42%" r="75%">
      <stop offset="0%"   stop-color="#0c181a"/>
      <stop offset="55%"  stop-color="#070d0e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="v4-vrs-bloom" cx="50%" cy="42%" r="40%">
      <stop offset="0%"   stop-color="#39bfc0" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#39bfc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v4-vrs-nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#c8f3f3"/>
      <stop offset="65%" stop-color="#39bfc0" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#39bfc0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="2048" height="2048" fill="url(#v4-vrs-field)"/>
  <rect width="2048" height="2048" fill="url(#v4-vrs-bloom)"/>
  <!-- orbital mark (upper foveal zone) -->
  <g transform="translate(1024,760) scale(3.6) translate(-60,-60)">
    <g fill="none" stroke="#39bfc0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="60" cy="60" rx="46" ry="17"/>
      <ellipse cx="60" cy="60" rx="46" ry="17" transform="rotate(60 60 60)"/>
      <ellipse cx="60" cy="60" rx="46" ry="17" transform="rotate(120 60 60)"/>
    </g>
    <circle cx="60" cy="60" r="9" fill="url(#v4-vrs-nucleus)"/>
    <circle cx="60" cy="60" r="2.4" fill="#ffffff"/>
  </g>
  <!-- ΔTOM wordmark centered below -->
  <g transform="translate(1024,1240) scale(1.25) translate(-410,-110)">
    <path d="M 96 26 L 192 194 L 0 194 Z M 96 84 L 146 178 L 46 178 Z" fill="#ffffff" fill-rule="evenodd"/>
    <path d="M 218 26 H 388 V 56 H 320 V 194 H 286 V 56 H 218 Z" fill="#ffffff"/>
    <circle cx="498" cy="110" r="74" fill="none" stroke="#39bfc0" stroke-width="24"/>
    <path d="M 614 194 V 26 H 646 L 710 168 L 774 26 H 806 V 194 H 774 V 96 L 722 194 H 698 L 646 96 V 194 Z" fill="#ffffff"/>
  </g>
  <text x="1024" y="1560" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="46" letter-spacing="10" fill="#7fd8d9" opacity="0.85">SPATIAL EXPERIENCE</text>
</svg>
