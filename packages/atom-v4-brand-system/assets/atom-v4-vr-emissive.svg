<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="v4-vre-title v4-vre-desc">
  <title id="v4-vre-title">ΔTOM V4 VR emissive icon</title>
  <desc id="v4-vre-desc">ΔTOM V4 VR-safe emissive orbital icon for Oculus/Meta headsets. Square 1024 canvas with transparent background, thicker strokes and an amplified bloom-ready nucleus so the mark survives lens chromatic aberration and reads at low angular size. Use as an emissive/unlit texture on a world-space quad against dark spatial backgrounds. Brand cyan #39BFC0.</desc>
  <defs>
    <radialGradient id="v4-vre-nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#d8f7f7"/>
      <stop offset="60%"  stop-color="#39bfc0" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#39bfc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="v4-vre-bloom" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#39bfc0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#39bfc0" stop-opacity="0"/>
    </radialGradient>
    <filter id="v4-vre-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- ambient bloom backing so the mark separates from dark spatial bg -->
  <circle cx="512" cy="512" r="470" fill="url(#v4-vre-bloom)"/>
  <g transform="translate(512,512) scale(4.6) translate(-60,-60)">
    <g filter="url(#v4-vre-glow)" fill="none" stroke="#39bfc0" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="60" cy="60" rx="46" ry="17"/>
      <ellipse cx="60" cy="60" rx="46" ry="17" transform="rotate(60 60 60)"/>
      <ellipse cx="60" cy="60" rx="46" ry="17" transform="rotate(120 60 60)"/>
    </g>
    <circle cx="60" cy="60" r="12" fill="url(#v4-vre-nucleus)"/>
    <circle cx="60" cy="60" r="3" fill="#ffffff"/>
  </g>
</svg>
